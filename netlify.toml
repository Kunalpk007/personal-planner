[build]
  command = "npm run build"

# These are server-only secrets that legitimately end up in compiled server
# bundle chunks (API routes, SSR functions) — those chunks run in Netlify's
# Functions runtime and are never shipped to the browser, so Netlify's
# secrets scanner otherwise flags them as false positives and fails the build.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SESSION_SECRET,FIREBASE_CLIENT_EMAIL,FIREBASE_PRIVATE_KEY"

# Use esbuild bundler for Netlify Functions to handle ESM/CJS interop
[functions]
  node_bundler = "esbuild"
